name: Backend CI (main)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BE
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: BE/requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: ruff check .
      - run: python -m pytest --cov=app --cov-report=term-missing

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ./BE
          push: false
          tags: lostlink-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
