name: lostlink

x-app-environment: &app-environment
  SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
  JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
  DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/${POSTGRES_DB:-db_server}
  CELERY_BROKER_URL: redis://redis:6379/0
  CELERY_RESULT_BACKEND: redis://redis:6379/1
  REDIS_URL: redis://redis:6379/2
  SOCKET_CORS_ORIGINS: ${SOCKET_CORS_ORIGINS:-*}
  UPLOAD_DIR: /data/uploads
  UPLOAD_URL_PREFIX: /uploads
  SERVE_UPLOADS: "false"
  OLLAMA_ENABLED: ${OLLAMA_ENABLED:-false}
  OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://127.0.0.1:11434}
  OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:4b}
  OLLAMA_TIMEOUT_SECONDS: ${OLLAMA_TIMEOUT_SECONDS:-60}
  MATCH_MIN_SCORE: ${MATCH_MIN_SCORE:-50}
  MATCH_NOTIFY_SCORE: ${MATCH_NOTIFY_SCORE:-85}

services:
  db:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-db_server}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-db_server}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build: .
    restart: unless-stopped
    environment: *app-environment
    volumes:
      - ${UPLOADS_PATH:-./data/uploads}:/data/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 20s

  worker:
    build: .
    restart: unless-stopped
    command: ["celery", "-A", "make_celery.celery_app", "worker", "--loglevel=INFO", "--concurrency=2"]
    environment: *app-environment
    volumes:
      - ${UPLOADS_PATH:-./data/uploads}:/data/uploads
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ${UPLOADS_PATH:-./data/uploads}:/data/uploads:ro
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
    name: postgres_data
  redis_data:
